<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบประเมินความเสี่ยงโรค NCDs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>ระบบทำนายความเสี่ยงโรค NCDs</h2>
        <form id="ncdForm">
            <div class="form-group">
                <label for="name">ชื่อ - นามสกุล:</label>
                <input type="text" id="name" required>
            </div>
            
            <div class="form-group">
                <label for="weight">น้ำหนัก (กิโลกรัม):</label>
                <input type="number" id="weight" step="0.1" required>
            </div>

            <div class="form-group">
                <label for="height">ส่วนสูง (เซนติเมตร):</label>
                <input type="number" id="height" required>
            </div>

            <div class="form-group">
                <label for="smoking">คุณสูบบุหรี่หรือไม่?</label>
                <select id="smoking">
                    <option value="no">ไม่สูบ</option>
                    <option value="yes">สูบ</option>
                </select>
            </div>

            <button type="submit">ประเมินความเสี่ยงและบันทึกข้อมูล</button>
        </form>

        <div id="result" class="hidden">
            <h3>ผลการประเมิน:</h3>
            <p id="resultText"></p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
